services:
  - type: web
    name: aimus-training
    env: docker
    plan: starter
    region: singapore
    autoDeploy: true
    healthCheckPath: /api/v1/health
    disk:
      name: aimus-data
      mountPath: /app/data
      sizeGB: 5
    envVars:
      - key: FORGE_DATA_DIR
        value: /app/data
      - key: FORGE_SECURE_COOKIES
        value: "true"
      - key: FORGE_SESSION_DAYS
        value: "30"
      - key: FORGE_EXPORT_USER_REGISTRY
        value: "false"
      - key: FORGE_ADMIN_LOGIN_IDS
        value: "AI123"
      - key: FORGE_BOOTSTRAP_ADMIN_PASSWORD_HASH
        value: "scrypt$16384$8$1$8e7eaca1f6d947147ac5591807a6e9be$7b6965d9dff18e9ce10013ec614d150bfb98fd8d00863571fe29d53411975a6c"
      - key: FORGE_MAX_UPLOAD_MB
        value: "300"
      - key: FORGE_PUBLIC_BASE_URL
        value: https://aimus-training.onrender.com
      - key: FORGE_ALLOWED_ORIGINS
        value: https://aimus-training.onrender.com
